<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French with Paul</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4ff;--surface:#ffffff;--surface2:#f8f9ff;--border:#e2e8f8;
  --text:#1a1f3c;--muted:#6b7280;--faint:#9ca3af;
  --purple:#6c63ff;--purple2:#8b85ff;--pink:#f472b6;--green:#10b981;
  --red:#ef4444;--gold:#f59e0b;
  --radius:1rem;--shadow:0 4px 24px rgba(108,99,255,.12);
  --font:'Nunito',sans-serif;
}
[data-theme="dark"]{
  --bg:#0f1021;--surface:#1a1d35;--surface2:#22264a;--border:#2d3159;
  --text:#e8eaf6;--muted:#9fa8da;--faint:#5c6bc0;
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;transition:background .3s,color .3s}
img{display:block;max-width:100%;height:auto}
button{cursor:pointer;font-family:var(--font)}

/* THEME TOGGLE */
#themeBtn{position:fixed;top:1rem;right:1rem;z-index:999;width:42px;height:42px;border-radius:50%;border:none;background:var(--surface);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:all .2s}
#themeBtn:hover{transform:scale(1.1)}

/* LOGIN SCREEN */
#loginScreen{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%)}
.login-card{background:var(--surface);border-radius:2rem;padding:3rem 2.5rem;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center}
.login-logo{width:72px;height:72px;background:linear-gradient(135deg,#667eea,#f093fb);border-radius:1.5rem;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 1.5rem;box-shadow:0 8px 24px rgba(102,126,234,.4)}
.login-card h1{font-size:1.8rem;font-weight:900;color:var(--text);margin-bottom:.5rem}
.login-card p{color:var(--muted);font-size:.95rem;margin-bottom:2rem;line-height:1.6}
.btn-google{width:100%;padding:.9rem 1.5rem;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:.75rem;transition:all .2s;margin-bottom:1.25rem}
.btn-google:hover{border-color:var(--purple);background:var(--surface2);transform:translateY(-2px);box-shadow:var(--shadow)}
.google-icon{width:20px;height:20px}
.divider{display:flex;align-items:center;gap:1rem;color:var(--faint);font-size:.85rem;margin-bottom:1.25rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.login-name-input{width:100%;padding:.85rem 1.2rem;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface2);color:var(--text);font-size:1rem;font-family:var(--font);font-weight:600;margin-bottom:.75rem;transition:border-color .2s;outline:none}
.login-name-input:focus{border-color:var(--purple)}
.login-name-input::placeholder{color:var(--faint)}
.btn-enter{width:100%;padding:.9rem;border-radius:var(--radius);border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1rem;font-weight:800;transition:all .2s;letter-spacing:.02em}
.btn-enter:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(102,126,234,.5)}
.login-error{color:var(--red);font-size:.85rem;margin-top:.75rem;display:none}

/* PORTAL */
#portalScreen{display:none;min-height:100dvh;padding-bottom:3rem}
.portal-header{background:linear-gradient(135deg,#667eea 0%,#764ba2 60%,#f093fb 100%);padding:2rem 1.5rem 3rem;position:relative;overflow:hidden}
.portal-header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:40px;background:var(--bg);border-radius:40px 40px 0 0}
.header-inner{max-width:800px;margin:0 auto}
.user-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.user-avatar{width:52px;height:52px;border-radius:50%;border:3px solid rgba(255,255,255,.6);object-fit:cover;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden}
.user-info h2{color:#fff;font-size:1.2rem;font-weight:800}
.user-info p{color:rgba(255,255,255,.75);font-size:.85rem}
.btn-signout{margin-left:auto;padding:.4rem .9rem;border-radius:2rem;border:2px solid rgba(255,255,255,.4);background:transparent;color:#fff;font-size:.8rem;font-weight:700;transition:all .2s}
.btn-signout:hover{background:rgba(255,255,255,.15)}
.progress-section{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border-radius:1.25rem;padding:1.25rem 1.5rem;border:1px solid rgba(255,255,255,.25)}
.progress-label{display:flex;justify-content:space-between;align-items:center;color:#fff;font-size:.9rem;font-weight:700;margin-bottom:.75rem}
.progress-pct{font-size:1.5rem;font-weight:900}
.progress-bar-bg{height:12px;background:rgba(255,255,255,.25);border-radius:99px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#a8ff78,#78ffd6);border-radius:99px;transition:width .8s cubic-bezier(.34,1.56,.64,1);width:0%}
.progress-subtitle{color:rgba(255,255,255,.7);font-size:.8rem;margin-top:.5rem}

/* LESSONS GRID */
.lessons-wrap{max-width:800px;margin:0 auto;padding:1.5rem}
.section-title{font-size:1.1rem;font-weight:800;color:var(--text);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.lessons-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(340px,100%),1fr));gap:1.25rem}
.lesson-card{background:var(--surface);border-radius:1.5rem;padding:1.5rem;border:2px solid var(--border);box-shadow:var(--shadow);transition:all .25s;position:relative;overflow:hidden}
.lesson-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(108,99,255,.2);border-color:var(--purple)}
.lesson-card.done{border-color:var(--green)}
.lesson-card.done::after{content:'✓';position:absolute;top:1rem;right:1rem;width:28px;height:28px;background:var(--green);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:900}
.lesson-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .8rem;border-radius:99px;font-size:.75rem;font-weight:800;margin-bottom:.75rem;letter-spacing:.03em}
.badge-a1{background:linear-gradient(135deg,#667eea22,#764ba222);color:var(--purple)}
.lesson-title{font-size:1.05rem;font-weight:800;color:var(--text);margin-bottom:.4rem}
.lesson-desc{font-size:.85rem;color:var(--muted);line-height:1.5;margin-bottom:1rem}
.lesson-meta{display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--faint);margin-bottom:1rem}
.lesson-progress-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:1rem}
.lesson-progress-fill{height:100%;border-radius:99px;transition:width .6s ease;background:linear-gradient(90deg,var(--purple),var(--pink))}
.lesson-progress-fill.done-fill{background:linear-gradient(90deg,var(--green),#a8ff78)}
.lesson-actions{display:flex;gap:.75rem}
.btn-start{flex:1;padding:.7rem 1rem;border-radius:.75rem;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:.9rem;font-weight:800;transition:all .2s;text-decoration:none;text-align:center}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(102,126,234,.4)}
.btn-start.revisit{background:linear-gradient(135deg,var(--green),#34d399)}
.btn-done{padding:.7rem 1rem;border-radius:.75rem;border:2px solid var(--border);background:transparent;color:var(--muted);font-size:.85rem;font-weight:700;transition:all .2s;white-space:nowrap}
.btn-done:hover{border-color:var(--green);color:var(--green)}
.btn-done.marked{background:var(--green);border-color:var(--green);color:#fff}
.coming-soon{opacity:.5;pointer-events:none}
.coming-soon .btn-start{background:var(--border);color:var(--muted)}

/* RESPONSIVE */
@media(max-width:480px){
  .login-card{padding:2rem 1.5rem}
  .portal-header{padding:1.5rem 1rem 2.5rem}
  .lessons-wrap{padding:1rem}
}
</style>
</head>
<body>

<!-- THEME TOGGLE -->
<button id="themeBtn" aria-label="Toggle dark mode">🌙</button>

<!-- ═══════════════════════════════ LOGIN SCREEN ═══════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🇫🇷</div>
    <h1>French with Paul</h1>
    <p>Sign in to track your progress across all lessons and pick up exactly where you left off.</p>

    <button class="btn-google" id="btnGoogle">
      <svg class="google-icon" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or enter your name</div>

    <input class="login-name-input" type="text" id="nameInput" placeholder="Your first name (e.g. Sophie)" maxlength="40" autocomplete="given-name">
    <button class="btn-enter" id="btnEnter">Enter my lessons →</button>
    <div class="login-error" id="loginError">Please enter your name to continue.</div>
  </div>
</div>

<!-- ═══════════════════════════════ PORTAL SCREEN ═══════════════════════════════ -->
<div id="portalScreen">
  <div class="portal-header">
    <div class="header-inner">
      <div class="user-row">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info">
          <h2 id="userGreeting">Bonjour !</h2>
          <p id="userEmail"></p>
        </div>
        <button class="btn-signout" id="btnSignOut">Sign out</button>
      </div>
      <div class="progress-section">
        <div class="progress-label">
          <span>🎯 Your progress</span>
          <span class="progress-pct" id="pctLabel">0%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="globalBar"></div>
        </div>
        <div class="progress-subtitle" id="progressSubtitle">Complete lessons to fill your progress bar</div>
      </div>
    </div>
  </div>

  <div class="lessons-wrap">
    <div class="section-title">📚 Your A1 Lessons</div>
    <div class="lessons-grid" id="lessonsGrid"></div>
  </div>
</div>

<!-- ═══════════════════════════════ FIREBASE + APP LOGIC ═══════════════════════════════ -->
<script type="module">
import { initializeApp }                         from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAnalytics }                          from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
import { getAuth, GoogleAuthProvider,
         signInWithPopup, onAuthStateChanged,
         signOut }                               from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc }     from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* ── Firebase init ── */
const firebaseConfig = {
  apiKey: "AIzaSyBnVNJwye7yLZR91ubz4YvorpR2hc3MWKg",
  authDomain: "french-with-paul.firebaseapp.com",
  projectId: "french-with-paul",
  storageBucket: "french-with-paul.firebasestorage.app",
  messagingSenderId: "1059123342588",
  appId: "1:1059123342588:web:15ba94f9196d2f12a6fb79",
  measurementId: "G-WYKRH09QJ9"
};
const app       = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth      = getAuth(app);
const db        = getFirestore(app);
const gProvider = new GoogleAuthProvider();

/* ── Lesson catalogue ── */
const LESSONS = [
  { id:"L01", badge:"A1 · Lesson 1", title:"Bonjour ! Vocabulary",      desc:"Greetings, numbers, classroom objects and your first French conversation.", icon:"👋", url:"https://thetamoul.github.io/bonjour-vocab-lesson/", activities:8 },
  { id:"L02", badge:"A1 · Lesson 2", title:"Les Articles Définis",       desc:"Master le, la, l' and les with interactive drag-and-drop and photo quizzes.", icon:"📖", url:"https://thetamoul.github.io/articles-definis-grammar/", activities:10 },
  { id:"L03", badge:"A1 · Lesson 3", title:"Les Articles Indéfinis",     desc:"Un, une, des — building your first French sentences.", icon:"✏️", url:"#", activities:8, soon:true },
  { id:"L04", badge:"A1 · Lesson 4", title:"Les Couleurs",               desc:"Colours, adjective agreement and describing objects.", icon:"🎨", url:"#", activities:8, soon:true },
];

/* ── Theme toggle ── */
const themeBtn = document.getElementById("themeBtn");
let dark = window.matchMedia("(prefers-color-scheme:dark)").matches;
applyTheme();
themeBtn.addEventListener("click", () => { dark = !dark; applyTheme(); });
function applyTheme(){ document.documentElement.setAttribute("data-theme", dark?"dark":"light"); themeBtn.textContent = dark ? "☀️" : "🌙"; }

/* ── In-memory state (fallback for name-only login) ── */
let currentUser = null; // Firebase user object or {uid,displayName,photoURL,email}

/* ── Google Sign-In ── */
document.getElementById("btnGoogle").addEventListener("click", async () => {
  try {
    const result = await signInWithPopup(auth, gProvider);
    // onAuthStateChanged will handle the rest
  } catch(e) {
    if(e.code !== "auth/popup-closed-by-user") {
      document.getElementById("loginError").textContent = "Google sign-in failed. Please try the name field below.";
      document.getElementById("loginError").style.display = "block";
    }
  }
});

/* ── Name-only login ── */
document.getElementById("btnEnter").addEventListener("click", () => enterByName());
document.getElementById("nameInput").addEventListener("keydown", e => { if(e.key==="Enter") enterByName(); });
function enterByName(){
  const name = document.getElementById("nameInput").value.trim();
  if(!name){ document.getElementById("loginError").style.display="block"; return; }
  document.getElementById("loginError").style.display="none";
  const uid = "guest_" + name.toLowerCase().replace(/\s+/g,"_");
  currentUser = { uid, displayName:name, photoURL:null, email:"" };
  loadPortal(currentUser);
}

/* ── Auth state listener ── */
onAuthStateChanged(auth, user => {
  if(user){ currentUser = user; loadPortal(user); }
  // if null and no currentUser, stay on login screen
});

/* ── Sign out ── */
document.getElementById("btnSignOut").addEventListener("click", async () => {
  if(auth.currentUser) await signOut(auth);
  currentUser = null;
  document.getElementById("portalScreen").style.display = "none";
  document.getElementById("loginScreen").style.display  = "flex";
});

/* ── Load portal for a user ── */
async function loadPortal(user){
  document.getElementById("loginScreen").style.display  = "none";
  document.getElementById("portalScreen").style.display = "block";

  // Avatar
  const avatarEl = document.getElementById("userAvatar");
  if(user.photoURL){ avatarEl.innerHTML = `<img src="${user.photoURL}" width="52" height="52" alt="${user.displayName}" style="width:52px;height:52px;border-radius:50%;object-fit:cover">`; }
  else { avatarEl.textContent = (user.displayName||"?")[0].toUpperCase(); }

  document.getElementById("userGreeting").textContent = `Bonjour, ${(user.displayName||"").split(" ")[0]} ! 🇫🇷`;
  document.getElementById("userEmail").textContent     = user.email || "Guest session";

  // Load progress from Firestore (or empty for guests)
  let progress = {};
  if(!user.uid.startsWith("guest_")){
    try {
      const snap = await getDoc(doc(db,"students",user.uid));
      if(snap.exists()) progress = snap.data().progress || {};
    } catch(e){ console.warn("Firestore read failed:",e); }
  }

  renderLessons(progress, user);
}

/* ── Render lesson cards ── */
function renderLessons(progress, user){
  const grid = document.getElementById("lessonsGrid");
  grid.innerHTML = "";

  LESSONS.forEach(lesson => {
    const done     = !!progress[lesson.id];
    const pct      = done ? 100 : 0;
    const card     = document.createElement("div");
    card.className = "lesson-card" + (done?" done":"") + (lesson.soon?" coming-soon":"");
    card.innerHTML = `
      <div class="lesson-badge badge-a1">${lesson.icon} ${lesson.badge}</div>
      <div class="lesson-title">${lesson.title}</div>
      <div class="lesson-desc">${lesson.desc}</div>
      <div class="lesson-meta">📝 ${lesson.activities} activities${lesson.soon?" &nbsp;·&nbsp; 🔜 Coming soon":""}</div>
      <div class="lesson-progress-bar"><div class="lesson-progress-fill ${done?"done-fill":""}" style="width:${pct}%"></div></div>
      <div class="lesson-actions">
        <a class="btn-start ${done?"revisit":""}" href="${lesson.soon?"#":lesson.url}" ${lesson.soon?"":"target=\"_blank\" rel=\"noopener noreferrer\""}">${done?"↩ Revisit":"▶ Start lesson"}</a>
        ${!lesson.soon ? `<button class="btn-done ${done?"marked":""}" data-id="${lesson.id}">${done?"✓ Done":"Mark done"}</button>` : ""}
      </div>`;
    grid.appendChild(card);
  });

  // Mark-done buttons
  grid.querySelectorAll(".btn-done").forEach(btn => {
    btn.addEventListener("click", () => markDone(btn.dataset.id, progress, user));
  });

  updateGlobalBar(progress);
}

/* ── Mark lesson done ── */
async function markDone(lessonId, progress, user){
  progress[lessonId] = true;

  // Save to Firestore if real Google user
  if(!user.uid.startsWith("guest_")){
    try {
      await setDoc(doc(db,"students",user.uid), {
        displayName: user.displayName,
        email: user.email,
        photoURL: user.photoURL||"",
        progress
      }, { merge:true });
    } catch(e){ console.warn("Firestore write failed:",e); }
  }

  renderLessons(progress, user);
}

/* ── Global progress bar ── */
function updateGlobalBar(progress){
  const total   = LESSONS.filter(l=>!l.soon).length;
  const done    = LESSONS.filter(l=>!l.soon && progress[l.id]).length;
  const pct     = total ? Math.round(done/total*100) : 0;
  document.getElementById("globalBar").style.width     = pct + "%";
  document.getElementById("pctLabel").textContent      = pct + "%";
  document.getElementById("progressSubtitle").textContent =
    done===total && total>0
      ? "🎉 Excellent ! All lessons completed!"
      : `${done} of ${total} lessons completed`;
}
</script>
</body>
</html>
